<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการสินค้า — โรงแรม</title>

    <!-- Google Fonts: Prompt (Thai) + Inter (Latin) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        /* ===========================
           DESIGN SYSTEM — LIGHT THEME
           =========================== */
        :root {
            /* Light palette */
            --bg-primary: #f0f4f8;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-glass: rgba(255, 255, 255, 0.6);
            --bg-glass-hover: rgba(255, 255, 255, 0.85);

            /* Accent colors */
            --accent-emerald: #059669;
            --accent-emerald-light: #d1fae5;
            --accent-emerald-glow: rgba(5, 150, 105, 0.15);

            /* Navbar blue */
            --nav-blue: #2563eb;
            --nav-blue-light: #dbeafe;
            --nav-blue-glow: rgba(37, 99, 235, 0.15);
            --accent-gold: #d97706;
            --accent-gold-light: #fef3c7;
            --accent-gold-glow: rgba(217, 119, 6, 0.12);
            --accent-rose: #e11d48;
            --accent-rose-light: #ffe4e6;
            --accent-rose-glow: rgba(225, 29, 72, 0.12);
            --accent-sky: #0284c7;
            --accent-sky-light: #e0f2fe;
            --accent-sky-glow: rgba(2, 132, 199, 0.12);
            --accent-violet: #7c3aed;
            --accent-violet-light: #ede9fe;

            /* Text */
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;

            /* Borders */
            --border-subtle: rgba(0, 0, 0, 0.06);
            --border-accent: rgba(5, 150, 105, 0.25);

            /* Shadows */
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.04);
            --shadow-glow: 0 0 40px rgba(5, 150, 105, 0.08);

            /* Radii */
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;

            /* Transitions */
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --duration-fast: 0.2s;
            --duration-normal: 0.35s;
            --duration-slow: 0.6s;
        }

        /* ===========================
           RESET & BASE
           =========================== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Soft ambient gradients */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -15%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(5, 150, 105, 0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -25%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===========================
           NAVBAR
           =========================== */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 64px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px) saturate(1.6);
            -webkit-backdrop-filter: blur(20px) saturate(1.6);
            border-bottom: 1px solid var(--border-subtle);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.03);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: -0.3px;
        }

        .nav-brand-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, #2563eb, #60a5fa);
            color: #fff;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px var(--nav-blue-glow);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--duration-fast) var(--ease-out);
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: rgba(0, 0, 0, 0.04);
        }

        .nav-link.active {
            color: var(--nav-blue);
            background: var(--nav-blue-light);
            font-weight: 600;
        }

        /* ===========================
           MAIN CONTENT
           =========================== */
        .main-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 60px;
        }

        /* ===========================
           FLASH MESSAGES (TOAST)
           =========================== */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 24px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 420px;
        }

        .toast-msg {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.5s var(--ease-out) forwards;
            cursor: pointer;
            transition: opacity var(--duration-fast);
        }

        .toast-msg:hover {
            opacity: 0.85;
        }

        .toast-msg.success {
            border-left: 4px solid var(--accent-emerald);
            background: #f0fdf4;
        }

        .toast-msg.warning {
            border-left: 4px solid var(--accent-gold);
            background: #fffbeb;
        }

        .toast-msg.error {
            border-left: 4px solid var(--accent-rose);
            background: #fff1f2;
        }

        .toast-msg.info {
            border-left: 4px solid var(--accent-sky);
            background: #f0f9ff;
        }

        .toast-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .toast-msg.success .toast-icon {
            color: var(--accent-emerald);
        }

        .toast-msg.warning .toast-icon {
            color: var(--accent-gold);
        }

        .toast-msg.error .toast-icon {
            color: var(--accent-rose);
        }

        .toast-msg.info .toast-icon {
            color: var(--accent-sky);
        }

        .toast-text {
            font-size: 0.9rem;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .toast-close {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 4px;
            transition: color var(--duration-fast);
        }

        .toast-close:hover {
            color: var(--text-primary);
        }

        /* ===========================
           UTILITY CLASSES
           =========================== */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }

        .section-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .btn-primary-glow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #059669, #34d399);
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--duration-normal) var(--ease-out);
            box-shadow: 0 4px 14px var(--accent-emerald-glow);
        }

        .btn-primary-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(5, 150, 105, 0.25);
            color: #fff;
        }

        .btn-secondary-outline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            text-decoration: none;
            transition: all var(--duration-normal) var(--ease-out);
        }

        .btn-secondary-outline:hover {
            color: var(--text-primary);
            background: #f8fafc;
            border-color: rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .btn-danger-glow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #e11d48, #fb7185);
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--duration-normal) var(--ease-out);
            box-shadow: 0 4px 14px var(--accent-rose-glow);
        }

        .btn-danger-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(225, 29, 72, 0.2);
            color: #fff;
        }

        .btn-warning-glow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #d97706, #fbbf24);
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--duration-normal) var(--ease-out);
            box-shadow: 0 4px 14px var(--accent-gold-glow);
        }

        .btn-warning-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(217, 119, 6, 0.2);
            color: #fff;
        }

        /* ===========================
           BADGE
           =========================== */
        .badge-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-success {
            background: var(--accent-emerald-light);
            color: var(--accent-emerald);
            border: 1px solid rgba(5, 150, 105, 0.15);
        }

        .badge-danger {
            background: var(--accent-rose-light);
            color: var(--accent-rose);
            border: 1px solid rgba(225, 29, 72, 0.15);
        }

        .badge-info {
            background: var(--accent-sky-light);
            color: var(--accent-sky);
            border: 1px solid rgba(2, 132, 199, 0.15);
        }

        .badge-gold {
            background: var(--accent-gold-light);
            color: var(--accent-gold);
            border: 1px solid rgba(217, 119, 6, 0.15);
        }

        /* ===========================
           ANIMATIONS
           =========================== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(60px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .animate-in {
            animation: fadeInUp 0.6s var(--ease-out) forwards;
            opacity: 0;
        }

        .animate-delay-1 {
            animation-delay: 0.08s;
        }

        .animate-delay-2 {
            animation-delay: 0.16s;
        }

        .animate-delay-3 {
            animation-delay: 0.24s;
        }

        .animate-delay-4 {
            animation-delay: 0.32s;
        }

        .animate-delay-5 {
            animation-delay: 0.4s;
        }

        .animate-delay-6 {
            animation-delay: 0.48s;
        }

        /* ===========================
           RESPONSIVE
           =========================== */
        @media (max-width: 768px) {
            .top-nav {
                padding: 0 16px;
            }

            .main-wrapper {
                padding: 20px 14px 40px;
            }

            .nav-links {
                display: none;
            }

            .section-title {
                font-size: 1.35rem;
            }
        }

        /* ===========================
           SCROLLBAR
           =========================== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.18);
        }

        /* ===========================
           FOOTER
           =========================== */
        .site-footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-subtle);
            margin-top: 48px;
        }

        .site-footer a {
            color: var(--accent-emerald);
            text-decoration: none;
        }
    </style>
</head>

<body>

    <!-- === NAVBAR === -->
    <nav class="top-nav">
        <a class="nav-brand" href="{% url 'product_list' %}">
            <span class="nav-brand-icon">
                <i class="bi bi-building"></i>
            </span>
            <span>Hotel Manager</span>
        </a>
        <div class="nav-links">
            <a href="{% url 'product_list' %}" class="nav-link active">
                <i class="bi bi-grid-1x2"></i> สินค้า
            </a>
        </div>
    </nav>

    <!-- === FLASH MESSAGES === -->
    {% if messages %}
    <div class="toast-container" id="toastContainer">
        {% for message in messages %}
        <div class="toast-msg {% if message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% elif message.tags == 'error' %}error{% else %}info{% endif %}"
            onclick="this.style.opacity='0'; setTimeout(()=>this.remove(), 300)">
            <i
                class="bi toast-icon {% if message.tags == 'success' %}bi-check-circle-fill{% elif message.tags == 'warning' %}bi-exclamation-triangle-fill{% elif message.tags == 'error' %}bi-x-circle-fill{% else %}bi-info-circle-fill{% endif %}"></i>
            <span class="toast-text">{{ message }}</span>
            <button class="toast-close"
                onclick="event.stopPropagation(); this.parentElement.style.opacity='0'; setTimeout(()=>this.parentElement.remove(), 300)">
                <i class="bi bi-x"></i>
            </button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- === MAIN CONTENT === -->
    <main class="main-wrapper">
        {% block content %}
        {% endblock %}
    </main>

    <!-- === FOOTER === -->
    <footer class="site-footer">
        <p>© 2025 Hotel Product Manager — กลุ่ม 4</p>
    </footer>

    <!-- Auto-dismiss toasts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toasts = document.querySelectorAll('.toast-msg');
            toasts.forEach((t, i) => {
                setTimeout(() => {
                    t.style.transition = 'opacity 0.4s, transform 0.4s';
                    t.style.opacity = '0';
                    t.style.transform = 'translateX(40px)';
                    setTimeout(() => t.remove(), 400);
                }, 4000 + i * 800);
            });
        });
    </script>

</body>

</html>
